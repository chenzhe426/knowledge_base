# Retrieval v2: Two-stage retrieval with query enhancement.
#
# Changes from baseline:
#   - retrieve_top_k=20: retrieve 20 candidates, rerank, return top 5
#   - enable_query_enhance: apply lightweight financial query augmentation
#
mode: internal
top_k: 5
retrieve_top_k: 20
enable_query_enhance: true
normalize_text: true
use_doc_level_fallback: true

api:
  base_url: "http://127.0.0.1:8000"
  timeout: 60
